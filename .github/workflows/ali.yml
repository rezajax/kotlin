name : AliBuild

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  aliBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Install and Run Cowsay
      - run: |
            sudo apt-get install cowsay
            cowsay "Hello World"

