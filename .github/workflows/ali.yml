name: CI Workflow

on:
  push:
  workflow_dispatch:

jobs:
  aliBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Greet Ali
        run: echo "salam ali"

      - name: Greet Reza
        run: echo "salam reza"

      - name: Install and Run Cowsay
        run: |
          sudo apt update
          sudo apt install -y cowsay
          cowsay "Hello World"

  rezaPublishOnGhPages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
